<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>🦈 鯊魚寶寶選股系統 - 簡潔版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-button {
            flex: 1;
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .tab-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #555;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-buy {
            background: #27ae60;
            color: white;
        }
        
        .btn-buy:hover {
            background: #229954;
        }
        
        .btn-sell {
            background: #e74c3c;
            color: white;
        }
        
        .btn-sell:hover {
            background: #c0392b;
        }
        
        .btn-export {
            background: #3498db;
            color: white;
        }
        
        .btn-export:hover {
            background: #2980b9;
        }
        
        .positive {
            color: #27ae60;
            font-weight: bold;
        }
        
        .negative {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .score-badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }
        
        .score-high {
            background: #27ae60;
        }
        
        .score-medium {
            background: #f39c12;
        }
        
        .score-low {
            background: #e74c3c;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .modal-content h3 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .badge-buy {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
        }
        
        .badge-sell {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦈 鯊魚寶寶選股系統</h1>
            <div>Rick 的投資模擬練習 | 2029 退休計畫</div>
        </div>
        
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('picks')">📊 TOP 選股</button>
            <button class="tab-button" onclick="switchTab('portfolio')">💼 持倉明細</button>
            <button class="tab-button" onclick="switchTab('history')">📜 歷次買賣</button>
        </div>
        
        <!-- 頁面一：TOP 選股 -->
        <div id="picks" class="tab-content active">
            <div class="card">
                <h2>🏆 今日 TOP 推薦</h2>
                <p style="color:#666;margin-bottom:15px;">評分基於技術分析 + 法人動向 | 點擊「買入」開始模擬交易</p>
                <table id="picks-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>代號</th>
                            <th>名稱</th>
                            <th>股價</th>
                            <th>評分</th>
                            <th>推薦理由</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="picks-body">
                        <tr><td colspan="7" style="text-align:center;">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 頁面二：持倉明細 -->
        <div id="portfolio" class="tab-content">
            <div class="card">
                <h2>💼 持倉明細</h2>
                <div style="display:flex;gap:20px;margin-bottom:20px;">
                    <div>總成本: <strong id="total-cost">$0</strong></div>
                    <div>目前市值: <strong id="total-value">$0</strong></div>
                    <div>總損益: <strong id="total-pnl">$0</strong></div>
                    <div>報酬率: <strong id="total-return">0%</strong></div>
                </div>
                <table id="portfolio-table">
                    <thead>
                        <tr>
                            <th>代號</th>
                            <th>名稱</th>
                            <th>股數</th>
                            <th>買入價</th>
                            <th>現價</th>
                            <th>損益</th>
                            <th>報酬率</th>
                            <th>買入日期</th>
                            <th>持有天數</th>
                            <th>建倉理由</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-body">
                        <tr><td colspan="11" style="text-align:center;">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 頁面三：歷次買賣 -->
        <div id="history" class="tab-content">
            <div class="card">
                <h2>📜 歷次買賣記錄</h2>
                <div style="margin-bottom:15px;">
                    <button onclick="exportCSV()" class="btn btn-export">💾 匯出 CSV</button>
                </div>
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>類型</th>
                            <th>代號</th>
                            <th>名稱</th>
                            <th>股數</th>
                            <th>價格</th>
                            <th>金額</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr><td colspan="8" style="text-align:center;">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 買入彈窗 -->
    <div id="buy-modal" class="modal">
        <div class="modal-content">
            <h3>📈 模擬買入</h3>
            <div class="form-group">
                <label>股票</label>
                <input type="text" id="buy-stock-info" readonly>
            </div>
            <div class="form-group">
                <label>股數 *</label>
                <input type="number" id="buy-shares" value="1000" min="1">
            </div>
            <div class="form-group">
                <label>買入理由（自動填入推薦理由）</label>
                <textarea id="buy-reason" rows="2" readonly></textarea>
            </div>
            <div class="form-group">
                <label>個人附註（選填）</label>
                <textarea id="buy-note" rows="3" placeholder="例如：看好未來趨勢、技術突破等..."></textarea>
            </div>
            <div class="modal-buttons">
                <button onclick="confirmBuy()" class="btn btn-buy" style="flex:1;">確認買入</button>
                <button onclick="closeBuyModal()" class="btn" style="flex:1;background:#95a5a6;color:white;">取消</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8888/api';
        let currentBuyData = null;
        
        // 分頁切換
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'picks') loadPicks();
            if (tabName === 'portfolio') loadPortfolio();
            if (tabName === 'history') loadHistory();
        }
        
        // 載入 TOP 選股
        async function loadPicks() {
            try {
                const response = await fetch('daily_report.json');
                const data = await response.json();
                
                let allPicks = [];
                if (data.picks_20_30) allPicks = allPicks.concat(data.picks_20_30);
                if (data.picks_30_40) allPicks = allPicks.concat(data.picks_30_40);
                if (data.picks_40_50) allPicks = allPicks.concat(data.picks_40_50);
                
                allPicks.sort((a, b) => b.score - a.score);
                const top10 = allPicks.slice(0, 10);
                
                const tbody = document.getElementById('picks-body');
                tbody.innerHTML = top10.map((stock, index) => {
                    const rankEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : (index + 1);
                    const scoreClass = stock.score >= 75 ? 'score-high' : stock.score >= 65 ? 'score-medium' : 'score-low';
                    
                    return `
                        <tr>
                            <td><strong>${rankEmoji}</strong></td>
                            <td><strong>${stock.symbol}</strong></td>
                            <td>${stock.name}</td>
                            <td>$ ${stock.price}</td>
                            <td><span class="score-badge ${scoreClass}">${stock.score}</span></td>
                            <td style="font-size:0.9em;">${stock.advantage}</td>
                            <td>
                                <button onclick="showBuyModal('${stock.symbol}', '${stock.name}', ${stock.price}, '${stock.advantage}')" 
                                        class="btn btn-buy">
                                    📈 買入
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('載入選股失敗:', error);
            }
        }
        
        // 顯示買入彈窗
        function showBuyModal(symbol, name, price, reason) {
            currentBuyData = { symbol, name, price, reason };
            
            document.getElementById('buy-stock-info').value = `${name} (${symbol}) @ $${price}`;
            document.getElementById('buy-reason').value = reason;
            document.getElementById('buy-note').value = '';
            document.getElementById('buy-shares').value = 1000;
            
            document.getElementById('buy-modal').style.display = 'block';
        }
        
        function closeBuyModal() {
            document.getElementById('buy-modal').style.display = 'none';
        }
        
        // 確認買入
        async function confirmBuy() {
            const shares = parseInt(document.getElementById('buy-shares').value);
            const userNote = document.getElementById('buy-note').value;
            
            if (shares <= 0) {
                alert('請輸入有效的股數');
                return;
            }
            
            const fullNote = currentBuyData.reason + (userNote ? ` | 附註: ${userNote}` : '');
            
            const trade = {
                type: 'buy',
                symbol: currentBuyData.symbol,
                name: currentBuyData.name,
                shares: shares,
                price: currentBuyData.price,
                date: new Date().toISOString(),
                note: fullNote
            };
            
            try {
                const response = await fetch(`${API_BASE}/trade/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(trade)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(`✅ 買入成功！\n\n${currentBuyData.name} (${currentBuyData.symbol})\n股數: ${shares}\n總金額: $${(shares * currentBuyData.price).toLocaleString()}`);
                    closeBuyModal();
                    loadPortfolio();
                } else {
                    alert('❌ 買入失敗: ' + result.message);
                }
            } catch (error) {
                alert('❌ 連線錯誤: ' + error.message);
            }
        }
        
        // 載入持倉明細
        async function loadPortfolio() {
            try {
                const response = await fetch(`${API_BASE}/holdings/batches`);
                const batches = await response.json();
                
                let totalCost = 0;
                let totalValue = 0;
                
                batches.forEach(batch => {
                    totalCost += batch.shares * batch.buy_price;
                    totalValue += batch.current_value;
                });
                
                const totalPnL = totalValue - totalCost;
                const totalReturn = totalCost > 0 ? (totalPnL / totalCost) * 100 : 0;
                
                document.getElementById('total-cost').textContent = '$' + Math.round(totalCost).toLocaleString();
                document.getElementById('total-value').textContent = '$' + Math.round(totalValue).toLocaleString();
                document.getElementById('total-pnl').textContent = (totalPnL >= 0 ? '+' : '') + '$' + Math.round(totalPnL).toLocaleString();
                document.getElementById('total-pnl').className = totalPnL >= 0 ? 'positive' : 'negative';
                document.getElementById('total-return').textContent = (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
                document.getElementById('total-return').className = totalReturn >= 0 ? 'positive' : 'negative';
                
                const tbody = document.getElementById('portfolio-body');
                if (batches.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:30px;">尚無持股<br>請到「📊 TOP 選股」買入開始模擬交易</td></tr>';
                } else {
                    tbody.innerHTML = batches.map(batch => {
                        const pnlClass = batch.profit_loss >= 0 ? 'positive' : 'negative';
                        const buyDate = new Date(batch.buy_date).toLocaleDateString('zh-TW');
                        
                        return `
                            <tr>
                                <td><strong>${batch.symbol}</strong></td>
                                <td>${batch.name}</td>
                                <td>${batch.shares.toLocaleString()}</td>
                                <td>$ ${batch.buy_price.toFixed(2)}</td>
                                <td>$ ${batch.current_price.toFixed(2)}</td>
                                <td class="${pnlClass}">
                                    ${batch.profit_loss >= 0 ? '+' : ''}$ ${Math.round(batch.profit_loss).toLocaleString()}
                                </td>
                                <td class="${pnlClass}">
                                    ${batch.return_pct >= 0 ? '+' : ''}${batch.return_pct.toFixed(2)}%
                                </td>
                                <td>${buyDate}</td>
                                <td>${batch.days_held} 天</td>
                                <td style="font-size:0.85em;">${batch.reason || '-'}</td>
                                <td>
                                    <button onclick="sellStock('${batch.symbol}', '${batch.name}', ${batch.current_price}, ${batch.shares})" 
                                            class="btn btn-sell">
                                        📉 賣出
                                    </button>
                                </td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('載入持倉失敗:', error);
            }
        }
        
        // 賣出股票
        async function sellStock(symbol, name, price, maxShares) {
            const shares = prompt(`請輸入要賣出的股數（目前持有 ${maxShares} 股）:`, maxShares);
            
            if (!shares || shares <= 0) return;
            if (parseInt(shares) > maxShares) {
                alert('❌ 賣出股數不能超過持有股數');
                return;
            }
            
            if (!confirm(`確定要賣出 ${name} (${symbol})？\n\n股數: ${shares}\n價格: $${price}\n總金額: $${(shares * price).toLocaleString()}`)) {
                return;
            }
            
            const trade = {
                type: 'sell',
                symbol: symbol,
                name: name,
                shares: parseInt(shares),
                price: price,
                date: new Date().toISOString(),
                note: '模擬賣出'
            };
            
            try {
                const response = await fetch(`${API_BASE}/trade/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(trade)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(`✅ 賣出成功！\n\n${name} (${symbol})\n股數: ${shares}\n總金額: $${(shares * price).toLocaleString()}`);
                    loadPortfolio();
                } else {
                    alert('❌ 賣出失敗: ' + result.message);
                }
            } catch (error) {
                alert('❌ 連線錯誤: ' + error.message);
            }
        }
        
        // 載入歷次買賣
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/trades`);
                const trades = await response.json();
                
                const tbody = document.getElementById('history-body');
                if (trades.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;">尚無交易記錄</td></tr>';
                } else {
                    tbody.innerHTML = trades.map(t => {
                        const date = new Date(t.date).toLocaleDateString('zh-TW');
                        const typeClass = t.type === 'buy' ? 'badge-buy' : 'badge-sell';
                        const typeText = t.type === 'buy' ? '買入' : '賣出';
                        const amountClass = t.type === 'buy' ? 'negative' : 'positive';
                        
                        return `
                            <tr>
                                <td>${date}</td>
                                <td><span class="${typeClass}">${typeText}</span></td>
                                <td><strong>${t.symbol}</strong></td>
                                <td>${t.name}</td>
                                <td>${t.shares.toLocaleString()}</td>
                                <td>$ ${t.price.toFixed(2)}</td>
                                <td class="${amountClass}">
                                    ${t.type === 'buy' ? '-' : '+'}$ ${Math.round(t.amount).toLocaleString()}
                                </td>
                                <td style="font-size:0.85em;">${t.note || '-'}</td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('載入歷史失敗:', error);
            }
        }
        
        // 匯出 CSV
        async function exportCSV() {
            try {
                const response = await fetch(`${API_BASE}/trades`);
                const trades = await response.json();
                
                if (trades.length === 0) {
                    alert('❌ 沒有交易記錄可匯出');
                    return;
                }
                
                let csv = '日期,類型,代號,名稱,股數,價格,金額,備註\n';
                
                trades.forEach(t => {
                    const date = new Date(t.date).toLocaleDateString('zh-TW');
                    const type = t.type === 'buy' ? '買入' : '賣出';
                    csv += `${date},${type},${t.symbol},${t.name},${t.shares},${t.price},${t.amount},"${t.note || ''}"\n`;
                });
                
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `交易記錄_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                
                alert('✅ CSV 檔案已匯出！');
            } catch (error) {
                alert('❌ 匯出失敗: ' + error.message);
            }
        }
        
        // 頁面載入時執行
        window.onload = function() {
            loadPicks();
        };
        
        // 點擊模態框外部關閉
        window.onclick = function(event) {
            if (event.target.id === 'buy-modal') {
                closeBuyModal();
            }
        };
    </script>
</body>
</html>
